<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }

        .cart-box{
            background:white;
            width:400px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px lightgray;
        }

        a{
            text-decoration:none;
        }

        button{
            background:orange;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="cart-box">
    <h1>🛒 Shopping Cart</h1>

    <p>1 Product Added Successfully</p>

    <br>

    <a href="/">
        <button>Continue Shopping</button>
    </a>
</div>

</body>
</html>
