<!DOCTYPE html>
<html>
<head>
  <title>ShopSphere</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .navbar {
      background: #131921;
      color: white;
      padding: 15px;
      font-size: 24px;
      text-align: center;
    }

    .products{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:30px;
    }

    .card {
      background: white;
      width: 250px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px lightgray;
      text-align: center;
    }

    button {
      background: orange;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
    .card img{
      width:100%;
      border-radius:10px;
    }
  </style>
</head>
<body>

<div class="navbar">
  🛒 ShopSphere
  <input type="text" placeholder="Search Products..."
         style="padding:8px; width:250px; margin-left:20px;">

  <span style="float:right;">
        <a href="/login" style="color:white;text-decoration:none;margin-right:20px;">
            Login
        </a>

        <a href="/cart" style="color:white;text-decoration:none;">
            Cart
        </a>

    <a href="/register"
       style="color:white;text-decoration:none;margin-right:20px;">
    Register
</a>

       </span>
</div>
<div style="
background:#232f3e;
color:white;
text-align:center;
padding:50px;">

  <h1>Welcome to ShopSphere 🛒</h1>

  <p>Best Deals on Electronics, Fashion & More</p>

  <button style="
    padding:10px 20px;
    background:orange;
    border:none;
    border-radius:5px;">
    Shop Now
  </button>

</div>
<div class="products">

  <div class="card">
    <img src="https://picsum.photos/200/150?random=4" alt="Smart Watch">
    <h2>Smart Watch</h2>
    <p>₹3,999</p>
    <p>⭐⭐⭐⭐⭐ (4.8)</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/200/150?random=5" alt="Keyboard">
    <h2>Keyboard</h2>
    <p>₹1,499</p>
    <p>⭐⭐⭐⭐⭐ (4.8)</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/200/150?random=6" alt="Mouse">
    <h2>Mouse</h2>
    <p>₹799</p>
    <p>⭐⭐⭐⭐⭐ (4.8)</p>
    <button>Add to Cart</button>
  </div>

</div>
<footer style="
background:#131921;
color:white;
text-align:center;
padding:15px;
margin-top:50px;">

  © 2026 ShopSphere | All Rights Reserved

</footer>
</body>
</html>
