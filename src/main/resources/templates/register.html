<!DOCTYPE html>
<html>
<head>
    <title>Register - ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .register-card{
            background:white;
            padding:40px;
            border-radius:20px;
            width:450px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .register-card h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn-register{
            width:100%;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="register-card">

    <h2>📝 Create Account</h2>

    <form action="/register-user" method="post">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success btn-register">
            Register
        </button>

    </form>

    <div class="login-link">
        <a href="/login">
            Already have an account? Login
        </a>
    </div>

</div>

</body>
</html>
